name: Performance Alerts

on:
  schedule:
    # Verificar a cada hora
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: |
          npx lhci autorun \
            --collect.url=https://cf.leandrostecca.com.br/dpl-pv01/ \
            --assert.matrix[0].assertions=categories:performance:score:>=95

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Performance Regression Detected!',
              body: 'Performance score dropped below 95%. Check workflow logs for details.',
              labels: ['critical', 'performance'],
            });
