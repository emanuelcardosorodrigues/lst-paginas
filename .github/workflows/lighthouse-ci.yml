name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Executar diariamente às 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://cf.leandrostecca.com.br/dpl-pv01/
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check thresholds
        run: |
          npx lhci autorun \
            --collect.url=https://cf.leandrostecca.com.br/dpl-pv01/ \
            --budgetPath=./.github/lighthouse-budget.json \
            --assert.matrix[0].assertions=categories:performance:score:>=95

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./.lighthouseci/lhr-*.json'));
            const score = Math.round(result.categories.performance.score * 100);
            const comment = `## Lighthouse Score: ${score}/100\n\nFull report available in the workflow artifacts.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
